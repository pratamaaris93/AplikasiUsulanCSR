<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Usulan CSR</title>

  <link rel="icon" type="image/x-icon" href="https://i.ibb.co.com/5xr9p1sM/logo-kabupaten-sampang.png">

  <style>
    body {
      background-color: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
      text-align: center;
      border-top: 6px solid #24292e;
    }
    h2 { margin-top: 0; color: #24292e; }
    p { color: #586069; line-height: 1.6; }
    .time { font-size: 0.8rem; color: #586069; margin-top: 20px; opacity: 0.7; }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #24292e;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card">
    <div id="loading" class="spinner"></div>
    
    <div id="content" style="display: none;">
      <h2 id="title">Memuat...</h2>
      <p id="message"></p>
      <div id="time" class="time"></div>
    </div>
    
    <div id="error" style="display: none; color: #cb2431; font-weight: bold;">
      ⚠️ Gagal memuat data dari server.
    </div>
  </div>

  <script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyIENCHU8uJSXEmEEZ052IMlBculYwCNG2CPwCfNDym0hT19BORB2A-vfdNC4tkawXopw/exec";

    fetch(webAppUrl)
      .then(res => {
        if(!res.ok) throw new Error();
        return res.json();
      })
      .then(data => {
        if(data.status === "success") {
          // Tampilkan data ke halaman web
          document.getElementById('title').innerText = data.title;
          document.getElementById('message').innerText = data.message;
          document.getElementById('time').innerText = "Update: " + data.timestamp;
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';
          
          // ====================================================================
          // FITUR OTOMATIS BUKA LINK SETELAH SAVE / BERHASIL LOAD
          // Jeda 2000 milidetik (2 detik) sebelum pindah halaman
          setTimeout(() => {
            // GANTI url di bawah ini dengan link tujuan yang Anda inginkan
            window.location.href = "https://www.google.com"; 
          }, 2000); 
          // ====================================================================
        }
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      });
  </script>
</body>
</html>
